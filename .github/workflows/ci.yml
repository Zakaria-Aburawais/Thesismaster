name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      # The validation gate from CLAUDE.md: JS parses, CSS braces balanced, divs balanced.
      - name: Validation gate — thesismaster.html
        run: |
          node -e "const fs=require('fs');const h=fs.readFileSync('thesismaster.html','utf8');const m=h.match(/<script>([\s\S]*)<\/script>/);new Function(m[1]);const c=h.match(/<style>([\s\S]*)<\/style>/)[1];if((c.match(/{/g)||[]).length!==(c.match(/}/g)||[]).length)throw'CSS unbalanced';if((h.match(/<div/g)||[]).length!==(h.match(/<\/div>/g)||[]).length)throw'div unbalanced';console.log('validation gate OK')"

      # The deploy copy must never drift from the source of truth.
      - name: public/index.html byte-identical to thesismaster.html
        run: cmp thesismaster.html public/index.html && echo "deploy copy identical"

      - name: Server syntax
        run: node --check server/server.js

      - name: Server install (from lockfile)
        working-directory: server
        run: npm ci

      - name: Dependency audit (fail on high or critical)
        working-directory: server
        run: npm audit --audit-level=high

      # Unit suite: the app's pure functions, extracted from thesismaster.html
      # and run against real EN + AR chapter fixtures (eval/).
      - name: Unit tests
        run: node --test 'tests/*.test.js'

      # API suite: real server + scratch DB + mock upstream. Proves store
      # isolation, quota fairness, lockout, GDPR erasure, webhook signatures.
      - name: Server API tests
        working-directory: server
        run: npm test
